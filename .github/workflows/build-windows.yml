name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements_win.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --noconsole --name "Murmur" --add-data "settings_server.py;." --add-data "context_engine.py;." --add-data "llm_engine.py;." --add-data "hipaa_engine.py;." --add-data "app_icon.ico;." --icon "app_icon.ico" "daemon_win.py"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Murmur-Windows
        path: dist/Murmur.exe

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: latest
        name: "Murmur for Windows (Latest)"
        body: "Automated release of the latest Murmur standalone application."
        files: dist/Murmur.exe
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
